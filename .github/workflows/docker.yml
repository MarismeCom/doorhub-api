name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  # 强制所有 JS actions 使用 Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # 镜像名称
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=latest
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set image name
        id: vars
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            docker build \
              -t ${{ steps.vars.outputs.image }}:${TAG} \
              -t ${{ steps.vars.outputs.image }}:latest \
              .
          else
            docker build \
              -t ${{ steps.vars.outputs.image }}:latest \
              .
          fi

- name: Push Docker image
  run: |
    if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
      TAG=${GITHUB_REF#refs/tags/}
      docker push ${{ steps.vars.outputs.image }}:${TAG}
      docker push ${{ steps.vars.outputs.image }}:latest
    else
      docker push ${{ steps.vars.outputs.image }}:latest
    fi